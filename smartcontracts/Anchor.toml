[toolchain]
anchor_version = "1.0.0"
solana_version = "3.1.13"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
smartcontracts = "FCfqU7hKCSZGkmPiVqZqhjq2v585uwPM4VvieqgnJm2j"

[programs.devnet]
smartcontracts = "FCfqU7hKCSZGkmPiVqZqhjq2v585uwPM4VvieqgnJm2j"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
# anchor build / anchor deploy are unreliable with this toolchain.
# Use these commands instead:
#   Build:  cargo-build-sbf --tools-version v1.54  (in smartcontracts/)
#   Deploy: solana program deploy target/deploy/smartcontracts.so \
#             --program-id FCfqU7hKCSZGkmPiVqZqhjq2v585uwPM4VvieqgnJm2j --url devnet
#   Tests:  anchor test  (starts fresh localnet, deploys via keypair, runs ts-mocha)

# Pre-seed the Circle devnet USDC mint at its canonical address on localnet.
# The fixture sets our test-mint-authority as the mint authority so tests can call mintTo.
[[test.validator.account]]
address = "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"
filename = "tests/fixtures/usdc-mint-account.json"

[hooks]
